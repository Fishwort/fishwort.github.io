<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cindy Chen</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --ink: #1a1a18;
      --muted: #7a7870;
      --accent: #3d5a4a;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .rule {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 2.5rem;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .contact-row {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      min-width: 52px;
    }

    .value {
      font-size: 1rem;
      color: var(--ink);
    }

    a.value {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    a.value:hover {
      border-color: var(--accent);
    }

    .footer-rule {
      margin-top: 3rem;
      border: none;
      border-top: 1px solid #d9d7d1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="rule"></div>
    <h1>Cindy <em>Chen</em></h1>
    <p class="tagline">Researcher · UNSW Sydney</p>
    <div class="contact">
      <div class="contact-row">
        <span class="label">Email</span>
        <a href="mailto:z5168418@ad.unsw.edu.au" class="value">z5168418@ad.unsw.edu.au</a>
      </div>
    </div>
    <hr class="footer-rule" />
  </div>
</body>
</html>
